# ==========================================
# Swasthya Sahayak - Application Properties
# ==========================================

# Server
server.port=8080

# MongoDB Configuration
spring.data.mongodb.uri=mongodb://localhost:27017/swasthya_sahayak
spring.data.mongodb.auto-index-creation=true

# JWT Configuration
app.jwt.secret=tanmay@1234
app.jwt.expiration-ms=86400000

# OpenAI / AI Configuration
app.openai.api-key=YOUR_OPENAI_API_KEY_HERE
app.openai.model=gpt-4.1-mini
app.openai.system-prompt=You are a helpful and friendly AI health assistant named "Swasthya Sahayak". Your role is to provide general health information, analyze symptoms, suggest possible causes, home remedies, and safe OTC medicines. You MUST always include a disclaimer: "This is not a medical diagnosis. Please consult a doctor." You must NOT prescribe strong medications. You can communicate in Hinglish (Hindi + English mix). If the user describes emergency symptoms (chest pain, stroke, severe bleeding, etc.), immediately tell them to call emergency services (108/112) and go to the nearest hospital. Be warm, empathetic, and informative.

# Google Places API (for nearby hospitals)
app.google.api-key=YOUR_GOOGLE_PLACES_API_KEY_HERE

# Logging
logging.level.com.swasthyasahayak=DEBUG
